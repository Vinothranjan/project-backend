<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis | Smart Surveillance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="logo">
                <div class="logo-icon">A</div>
                <div class="logo-text">
                    <h1>AEGIS</h1>
                    <p>Surveillance Engine</p>
                </div>
            </div>
            <div class="header-actions">
                <span id="system-time">--:--:--</span>
            </div>
        </header>

        <!-- Left Sidebar: Known Faces -->
        <aside class="sidebar">
            <h2>Recognized Personnel</h2>
            <div class="faces-grid" id="known-faces">
                <!-- Faces will be loaded here -->
                <div class="face-card">
                    <p>Loading...</p>
                </div>
            </div>
            
            <div style="margin-top: auto;">
                <h2>System Stats</h2>
                <div class="log-entry">
                    <div class="msg">Uptime: 2h 45m</div>
                </div>
            </div>
        </aside>

        <!-- Main Work Area -->
        <main class="main-content">
            <div class="video-container">
                <div class="video-overlay">
                    <div class="status-badge live">LIVE</div>
                    <div class="status-badge" id="protection-status">
                        <span id="status-text">SECURED</span>
                    </div>
                </div>
                
                <!-- Camera Selection Modal -->
                <div id="camera-modal" class="modal-overlay">
                    <div class="modal">
                        <h2>Select Camera Source</h2>
                        <p>Choose how you want to monitor your space.</p>
                        <div class="modal-options">
                            <button class="btn btn-primary" onclick="startCamera('internal')">💻 Internal Camera</button>
                            <div class="url-input-group">
                                <input type="text" id="ip-url" placeholder="http://192.168.1.5:8080">
                                <button class="btn btn-outline" onclick="startCamera('mobile')">📱 Mobile Camera</button>
                            </div>
                        </div>
                    </div>
                </div>

                <img src="{{ url_for('video_feed') }}" class="video-feed" id="main-feed" alt="Surveillance Stream">
            </div>

            <div class="control-panel-horizontal" style="display: flex; gap: 20px;">
                <button class="btn btn-primary" id="btn-toggle-guest">
                    <span>⚡ Toggle Guest Mode</span>
                </button>
                <button class="btn btn-outline" id="btn-train">
                    <span>🧠 Re-Train Model</span>
                </button>
                <button class="btn btn-outline" onclick="document.getElementById('camera-modal').style.display='flex'">
                    <span>📷 Change Camera</span>
                </button>
            </div>
        </main>

        <!-- Right Sidebar: Logs -->
        <aside class="sidebar">
            <h2>Activity Logs</h2>
            <div class="log-container" id="activity-logs">
                <div class="log-entry">
                    <div class="time">Just now</div>
                    <div class="msg">System initialized...</div>
                </div>
            </div>
            
            <div class="control-panel">
                <button class="btn btn-danger" style="background: var(--danger);" onclick="location.reload()">
                    <span>🔄 Refresh Stream</span>
                </button>
            </div>
        </aside>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
